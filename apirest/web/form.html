<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Movie</title>

    <style>
      :root {
        --bg: #0f172a;
        --card: rgba(30, 41, 59, 0.7);
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: radial-gradient(circle at top, #1e293b, #020617);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* CARD */
      .container {
        width: 100%;
        max-width: 500px;
        padding: 20px;
      }

      form {
        background: var(--card);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      /* TITLE */
      h1 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 1.8rem;
      }

      /* INPUTS */
      .field {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #020617;
        color: var(--text);
        outline: none;
        transition: 0.2s;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
      }

      /* GENRES GRID */
      .genres {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .genre-item {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #020617;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        cursor: pointer;
        transition: 0.2s;
      }

      .genre-item:hover {
        border-color: var(--primary);
      }

      .genre-item input {
        accent-color: var(--primary);
      }

      /* BUTTON */
      button {
        width: 100%;
        margin-top: 15px;
        background: var(--primary);
        color: white;
        padding: 12px;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <form>
        <h1>Add Movie 🎬</h1>

        <div class="field">
          <label>Title</label>
          <input type="text" id="title" required />
        </div>

        <div class="field">
          <label>Director</label>
          <input type="text" id="director" required />
        </div>

        <div class="field">
          <label>Year</label>
          <input type="number" id="year" required />
        </div>

        <div class="field">
          <label>Poster URL</label>
          <input type="text" id="poster" required />
        </div>

        <div class="field">
          <label>Genre</label>
          <div class="genres">
            <label class="genre-item">
              <input type="checkbox" value="Action" /> Action
            </label>
            <label class="genre-item">
              <input type="checkbox" value="Comedy" /> Comedy
            </label>
            <label class="genre-item">
              <input type="checkbox" value="Drama" /> Drama
            </label>
            <label class="genre-item">
              <input type="checkbox" value="Sci-Fi" /> Sci-Fi
            </label>
            <label class="genre-item">
              <input type="checkbox" value="Horror" /> Horror
            </label>
            <label class="genre-item">
              <input type="checkbox" value="Romance" /> Romance
            </label>
          </div>
        </div>

        <div class="field">
          <label>Duration (min)</label>
          <input type="number" id="duration" required />
        </div>

        <div class="field">
          <label>Rating</label>
          <input type="number" id="rate" min="0" max="10" step="0.1" />
        </div>

        <button type="submit" id="submit-btn">Add Movie</button>
      </form>
    </div>

    <script type="module">
      const url = "http://localhost:3000/movies";

      const params = new URLSearchParams(window.location.search);
      if (params.has("id")) {
        const id = params.get("id");
        fetch(`${url}/${id}`)
          .then((res) => res.json())
          .then((movie) => {
            document.getElementById("title").value = movie.title;
            document.getElementById("director").value = movie.director;
            document.getElementById("year").value = movie.year;
            document.getElementById("poster").value = movie.poster;
            document.getElementById("duration").value = movie.duration;
            document.getElementById("rate").value = movie.rate;
            document.getElementById("submit-btn").innerText = "Update Movie";

            // Marcar géneros
            movie.genre.forEach((g) => {
              const checkbox = document.querySelector(
                `.genre-item input[value="${g}"]`,
              );
              if (checkbox) checkbox.checked = true;
            });
          })
          .catch((err) => console.error(err));
      }

      document.querySelector("form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const title = document.getElementById("title").value;
        const director = document.getElementById("director").value;
        const year = Number(document.getElementById("year").value);
        const poster = document.getElementById("poster").value;
        const genre = Array.from(
          document.querySelectorAll(".genre-item input:checked"),
        ).map((input) => input.value);
        const rate = Number(document.getElementById("rate").value);
        const duration = Number(document.getElementById("duration").value);

        try {
          const id = params.get("id");
          const method = id ? "PATCH" : "POST";
          const response = await fetch(`${url}${id ? `/${id}` : ''}`, {
            method: method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title,
              director,
              year,
              poster,
              genre,
              rate,
              duration,
            }),
          });

          if (response.ok) {
            alert(`Movie ${id ? "updated" : "added"} successfully!`);
            window.location.href = "/";
          } else {
            alert(`Error ${id ? "updating" : "adding"} movie`);
          }
        } catch (error) {
          console.error(error);
          alert(`Error ${id ? "updating" : "adding"} movie`);
        }
      });
    </script>
  </body>
</html>
